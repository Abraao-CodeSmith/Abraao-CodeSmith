name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Abraao-CodeSmith
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#FFFF00&color_dots=#161b22,#40a7e6,#ff0000,#f7df1e,#6da55f
            dist/pacman-contribution-graph-dark.svg?color_snake=#FFFF00&color_dots=#0d1117,#40a7e6,#ff0000,#f7df1e,#6da55f

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
